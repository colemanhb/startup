<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libreboox HTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <!-- Use header, main, and footer elements to give semantic structure -->
    <header>
      <div class="main-buttons">
        <button id="menu-button" class="btn btn-light">☰</button>
        <button id="settings-button" class="btn btn-light">
          <i class="bi bi-gear"></i>
        </button> 
      </div>
      <!-- Navigation elements -->
      <nav id="sidebar">
        <h2>LibreBoox</h2>
        <!-- Menu is a semantic alternative to <ul> that represents an interaction -->
        <menu>
          <li><a href="index.html">Home</a></li>
          <li><a href="languages.html">Languages</a></li>
          <li><a href="page.html">Continue Reading</a></li>
          <li><a href="new_words.html">New Words</a></li>
          <li><a href="about.html">About</a></li>
        </menu>
      </nav>
      <aside id="settings-panel" class="open">
        <div class="theme-buttons">
          <button id="light-theme" class="btn btn-light">
            <i class="bi bi-square"></i>
          </button>
          <button id="dark-theme" class="btn btn-light">
            <i class="bi bi-square-fill"></i>
          </button>
        </div>
      </aside>

      <!-- Since we don't have the ability to style we use old style HTML to give some visual formatting -->
      <hr />
    </header>

    <main>
      <h1>Welcome to LibreBoox</h1>
      <form method="get" action="page.html">
        <div>
          <span>Username</span>
          <input type="text" placeholder="username" />
        </div>
        <div>
          <span>Password</span>
          <input type="password" placeholder="password" />
        </div>
        <button type="submit" class="btn btn-light">Log In</button>
        <button type="submit" class="btn btn-light">Create Account</button>
      </form>
    </main>

    <footer>
      <span class="text-reset">Coleman Hall-Brown</span>
      <div id="don-quixote" class="picture-box"><img height="100px" src="don_quixote.jpg" alt="Don Quixote" /></div>
      <div id="pinocchio" class="picture-box"><img height="100px" src="pinocchio.jpeg" alt="Pinocchio" /></div>
      <div id="le-fantome" class="picture-box"><img height="100px" src="le_fantome.jpg" alt="The Phantom of the Opera" /></div>
      <div id="alquimista" class="picture-box"><img height="100px" src="alquimista.jpg" alt="The Alchemist" /></div>
      <a href="https://github.com/colemanhb/startup/tree/main/libreboox-html">GitHub</a>
    </footer>
    <script src="main.js"></script>
  </body>
</html>
